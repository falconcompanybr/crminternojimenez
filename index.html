function packEvents(items) {
  items.sort((a, b) => a.s - b.s || a.en - b.en);
  let cluster = [], clusterEnd = -1, lanes = [];
  const flush = () => { if (!cluster.length) return; const total = lanes.length; cluster.forEach(x => x._lanes = total); cluster = []; lanes = []; clusterEnd = -1; };
  for (const it of items) {
    if (cluster.length && it.s >= clusterEnd) flush();
    let placed = false;
    for (let i = 0; i < lanes.length; i++) { if (it.s >= lanes[i]) { it._lane = i; lanes[i] = it.en; placed = true; break; } }
    if (!placed) { it._lane = lanes.length; lanes.push(it.en); }
    cluster.push(it); clusterEnd = Math.max(clusterEnd, it.en);
  }
  flush(); return items;
}
